<div class="row">
  <div class="col-xs-12">
    <p>Add new Servers or blueprints!</p>
    <label>Server Name</label>
    <!-- <input type="text" class="form-control" [(ngModel)]="newServerName" /> -->
    <input type="text" class="form-control" #serverNameInput />
    <!-- Another way of doing for when we don't want to use the two way binding, is the place a local reference on the
    element, it can be placed in any html element, we add with a # and a name of our choic
    This value will hold a reference to this element, not to only the value, but the whole html, and we can, per example
    pass it as an argument to a function, like in this case, where i pass this reference to the addServer function

    We can use this value everywhere in our template, not in the ts, but only in the html template.
    on the ts file, we can access it through the same value we pass on the input, on the parameters received, in that
    place, we have access to the element so as it's value
  -->

    <label>Server Content</label>
    <!-- <input type="text" class="form-control" [(ngModel)]="newServerContent" /> -->
    <input type="text" class="form-control" #serverContentInput />
    <br />
    <button class="btn btn-primary" (click)="onAddServer(serverNameInput)">Add Server</button>
    <button class="btn btn-primary" (click)="onAddBlueprint(serverNameInput)">
      Add Server Blueprint
    </button>
  </div>
</div>
